<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 标签回顾（表单 + 多媒体标签）</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/1.9.6/tailwind.min.css" rel="stylesheet">
  <style>
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
  </style>
</head>
<body class="bg-gray-200 p-4">
  <header>
    <h1 class="text-2xl">HTML 标签回顾（表单 + 多媒体标签）+ tailwind1.x</h1>
  </header>
  <nav class="shadow-md mb-2">
    <ul class="flex space-x-4 p-4 bg-white rounded">
      <li><a href="#form">表单标签</a></li>
      <li><a href="#media">多媒体标签</a></li>
    </ul>
  </nav>
  <main>
    <article id="form">
      <h2 class="text-xl font-bold mb-4">表单标签</h2>
      <section class="w-full">
        <form action="" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2"  for="username">用户名：</label>
            <input type="text" id="username" name="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="password">密码：</label>
            <input type="password" id="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
          </div>
          <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="email">邮箱：</label>
            <input type="email" id="email" name="email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
          </div>
          <input type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" value="提交">
        </form>
      </section>
    </article>
    <article id="media">
      <section class="w-full">
        <h2 class="text-xl font-bold mb-4">多媒体标签</h2>
        <video controls>
          <source src="https://vod.pipi.cn/43903a81vodtransgzp1251246104/bbd4f07a5285890808066187974/v.f42906.mp4" type="video/mp4">
          <source src="movie.ogg" type="video/ogg">
          您的浏览器不支持 video 标签。
        </video>
        <h2 class="text-xl font-bold mb-4">音频标签</h2>
        <audio controls class="mt-4">
          <source src="http://music.163.com/song/media/outer/url?id=447925558.mp3" type="audio/mpeg">
          <source src="audio.ogg" type="audio/ogg">
          您的浏览器不支持 audio 标签。
        </audio>
      </section>
    </article>
  </main>
  <footer>

  </footer>
</body>
</html>
